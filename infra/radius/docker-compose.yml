version: "3.9"
services:
  mariadb:
    image: mariadb:10.6
    container_name: radius-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: radius
      MYSQL_USER: radius
      MYSQL_PASSWORD: radiuspass
    ports:
      - "3306:3306"
    volumes:
      - radius-db:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/01-radius.sql:ro

  freeradius:
    image: freeradius/freeradius-server:latest
    container_name: freeradius
    depends_on:
      - mariadb
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
      - "3799:3799/udp"
    volumes:
      - ./freeradius/client.config:/etc/freeradius/3.0/clients.conf
      - ./freeradius/mods-available/sql.conf:/etc/freeradius/3.0/mods-available/sql
      - ./freeradius/mods-enabled/sql.conf:/etc/freeradius/3.0/mods-enabled/sql

volumes:
  radius-db:
